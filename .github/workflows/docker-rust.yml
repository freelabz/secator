name: docker-rust

# Build + publish the Rust port's container image to ghcr.io.
# Triggers:
#   - push to rust-dev (publishes `:dev` and `:sha-<short>`)
#   - tag `rust-v*` (publishes `:<version>` and `:latest`)
#   - manual dispatch
#
# The Python image stays on `freelabz/secator`; this workflow targets the
# Rust rewrite at `ghcr.io/freelabz/secator-rs`. Until parity is fully
# achieved the two are published side-by-side.

on:
  push:
    branches:
      - rust-dev
    tags:
      - 'rust-v*'
  workflow_dispatch:
    inputs:
      flavor:
        description: 'Image flavor (full | lite)'
        required: false
        default: 'full'

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/freelabz/secator-rs
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/rust-v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: rust
          file: rust/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            flavor=${{ inputs.flavor || 'full' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test pulled image
        run: |
          IMAGE=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          echo "Smoke-testing $IMAGE"
          docker run --rm "$IMAGE" --version
          docker run --rm "$IMAGE" health || true
